# =========================================
# NLP Pipeline Configuration
# Fintech Review Analytics
# =========================================

nlp:
  language: "en"
  detect_language: true

  text_cleaning:
    enabled: true
    steps:
      - lowercase
      - remove_urls
      - remove_html
      - remove_emojis
      - remove_special_chars
      - normalize_whitespace

  stopwords:
    enabled: true
    custom: []

  lemmatization: true
  stemming: false
  sentence_tokenize: true

# -----------------------------------------
# SENTIMENT ANALYSIS
# -----------------------------------------
sentiment:
  enabled: true
  engine: "vader" # vader | transformer

  transformer:
    model: "distilbert-base-uncased-finetuned-sst-2-english"
    batch_size: 16
    device: "cpu"

  rolling_window: 3
  aggregate_by: ["bank", "rating"]

# -----------------------------------------
# KEYWORD EXTRACTION
# -----------------------------------------
keywords:
  enabled: true
  method: "tfidf"

  tfidf:
    top_n: 50
    ngram_range: [1, 2]
    min_df: 2
    max_df: 0.9

  rake:
    min_len: 1
    max_len: 4

  yake:
    max_ngram_size: 3
    deduplication_threshold: 0.1
    top_k: 15

  keybert:
    model: "all-mpnet-base-v2"
    top_k: 10
    use_mmr: true

# -----------------------------------------
# THEME EXTRACTION
# -----------------------------------------
themes:
  enabled: true
  method: "manual"

  rules:
    - name: "Account Access"
      keywords:
        [
          "login",
          "log in",
          "password",
          "otp",
          "pin",
          "access",
          "signin",
          "sign in",
          "verification",
          "verify",
          "blocked",
          "locked",
          "session expired",
          "face id",
          "biometric",
          "fingerprint",
        ]

    - name: "Transaction Performance"
      keywords:
        [
          "slow",
          "transfer",
          "payment",
          "processing",
          "timeout",
          "failed",
          "fail",
          "delay",
          "lag",
          "loading",
          "crash",
          "bug",
          "error",
          "not working",
          "freeze",
          "stuck",
        ]

    - name: "User Interface / UX"
      keywords:
        [
          "ui",
          "layout",
          "design",
          "navigation",
          "experience",
          "ux",
          "confusing",
          "easy to use",
          "theme",
          "color",
          "button",
          "menu",
          "text",
          "responsive",
        ]

    - name: "Customer Support"
      keywords:
        [
          "support",
          "help",
          "call",
          "service",
          "response",
          "agent",
          "contact",
          "unhelpful",
          "rude",
        ]

    - name: "Feature Requests"
      keywords:
        [
          "feature",
          "add",
          "improve",
          "notification",
          "offline",
          "receipt",
          "balance",
          "statement",
          "download",
          "dark mode",
          "qr",
          "scan",
          "new version",
          "update",
          "custom alert",
        ]

  lda:
    num_topics: 8
    max_iter: 300

  kmeans:
    clusters: 10
    max_iter: 300

  nmf:
    components: 6

  hdbscan:
    min_cluster_size: 20

# -----------------------------------------
# OUTPUT SETTINGS
# -----------------------------------------
output:
  save_clean_text: true
  save_sentiment: true
  save_keywords: true
  save_themes: true

  clean_text_path: "data/interim/cleaned_reviews.csv"
  enriched_output_path: "data/processed/nlp_enriched_reviews.csv"
  sentiment_path: "data/processed/reviews_with_sentiment.csv"
  themes_path: "data/processed/reviews_with_themes.csv"
  themes_per_bank_dir: "data/processed/per_bank/"
